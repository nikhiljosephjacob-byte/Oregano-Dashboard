<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Oregano Group — BD Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#060c14;color:#e2e8f0;font-family:Inter,system-ui,sans-serif;font-size:13px}
nav{background:#0d1524;border-bottom:1px solid #1b2f4a;padding:0 20px;display:flex;align-items:center;height:50px;position:sticky;top:0;z-index:100}
.logo{font-weight:800;font-size:10px;color:#f59e0b;margin-right:20px;letter-spacing:2px;text-transform:uppercase;line-height:1.3;flex-shrink:0;display:flex;align-items:center;gap:8px}
.tab{padding:0 14px;height:50px;border:none;background:none;cursor:pointer;font-size:11px;font-weight:700;color:#64748b;border-bottom:2px solid transparent;transition:all .12s}
.tab.act{color:#f59e0b;border-bottom:2px solid #f59e0b}
.pg{padding:14px 20px;max-width:1300px;display:none}.pg.act{display:block}
.card{background:#0d1524;border:1px solid #1b2f4a;border-radius:8px;padding:14px;margin-bottom:12px}
.sm{background:#0d1524;border:1px solid #1b2f4a;border-radius:8px;padding:12px}
.ct{font-size:10px;color:#64748b;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{padding:7px 8px;text-align:left;color:#64748b;font-weight:700;font-size:10px;text-transform:uppercase;border-bottom:1px solid #1b2f4a;cursor:pointer;user-select:none}
.tbl th:hover{color:#f59e0b}
.tbl td{padding:7px 8px;border-bottom:1px solid rgba(27,47,74,.5);font-variant-numeric:tabular-nums}
.tbl tr:hover td{background:rgba(27,47,74,.3)}
.vrow{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid rgba(27,47,74,.4)}
.chip{font-size:9px;padding:2px 6px;border-radius:3px;font-weight:700;margin-right:3px}
.fbar{background:#0d1524;border:1px solid #1b2f4a;border-radius:8px;padding:10px 14px;margin-bottom:12px}
.preset{padding:4px 11px;border-radius:5px;border:1px solid #1b2f4a;background:transparent;color:#94a3b8;font-size:11px;font-weight:600;cursor:pointer;transition:all .12s;white-space:nowrap}
.preset.act{background:#f59e0b22;border-color:#f59e0b;color:#f59e0b}
.fpill{display:inline-flex;align-items:center;gap:5px;padding:4px 11px;border-radius:16px;border:1px solid #1b2f4a;background:#0d1524;color:#94a3b8;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap}
.fpill.on{border-color:#f59e0b;background:#f59e0b22;color:#f59e0b}
.dd-wrap{position:relative;display:inline-block}
.dd-menu{display:none;position:absolute;top:110%;left:0;background:#0d1524;border:1px solid #1b2f4a;border-radius:8px;padding:8px;z-index:300;min-width:175px;max-height:250px;overflow-y:auto;box-shadow:0 8px 24px rgba(0,0,0,.6)}
.dd-menu.open{display:block}
.ddi{display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:5px;cursor:pointer;font-size:12px;color:#e2e8f0}
.ddi:hover{background:#1b2f4a}
.ddi input[type=checkbox]{accent-color:#f59e0b;width:14px;height:14px;cursor:pointer}
.fchip{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:10px;font-size:11px;font-weight:600;cursor:pointer}
.brbtn{display:flex;align-items:center;gap:8px;padding:7px 14px;border-radius:10px;cursor:pointer;border:2px solid;background:transparent;transition:all .15s}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh}
@media(max-width:700px){.g4{grid-template-columns:1fr 1fr}.g2{grid-template-columns:1fr}}
</style>
</head>

<div id="main-app" style="display:none">

    <button onclick="doLoad()" style="margin-left:10px;background:none;border:1px solid #1b2f4a;border-radius:4px;color:#64748b;padding:3px 10px;font-size:12px;cursor:pointer">↻ Refresh</button>
  </nav>
