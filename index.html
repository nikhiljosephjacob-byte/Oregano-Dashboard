<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Oregano Restaurants — BD Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#060c14;color:#e2e8f0;font-family:Inter,system-ui,sans-serif;font-size:13px}
nav{background:#0d1524;border-bottom:1px solid #1b2f4a;padding:0 20px;display:flex;align-items:center;height:50px;position:sticky;top:0;z-index:100}
.logo{font-weight:800;font-size:10px;color:#f59e0b;margin-right:20px;letter-spacing:2px;text-transform:uppercase;line-height:1.3;flex-shrink:0;display:flex;align-items:center;gap:8px}
.tab{padding:0 14px;height:50px;border:none;background:none;cursor:pointer;font-size:11px;font-weight:700;color:#64748b;border-bottom:2px solid transparent;transition:all .12s}
.tab.act{color:#f59e0b;border-bottom:2px solid #f59e0b}
.pg{padding:14px 20px;max-width:1300px;display:none}.pg.act{display:block}
.card{background:#0d1524;border:1px solid #1b2f4a;border-radius:8px;padding:14px;margin-bottom:12px}
.sm{background:#0d1524;border:1px solid #1b2f4a;border-radius:8px;padding:12px}
.ct{font-size:10px;color:#64748b;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{padding:7px 8px;text-align:left;color:#64748b;font-weight:700;font-size:10px;text-transform:uppercase;border-bottom:1px solid #1b2f4a;cursor:pointer;user-select:none}
.tbl th:hover{color:#f59e0b}
.tbl td{padding:7px 8px;border-bottom:1px solid rgba(27,47,74,.5);font-variant-numeric:tabular-nums}
.tbl tr:hover td{background:rgba(27,47,74,.3)}
.vrow{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid rgba(27,47,74,.4)}
.chip{font-size:9px;padding:2px 6px;border-radius:3px;font-weight:700;margin-right:3px}
.fbar{background:#0d1524;border:1px solid #1b2f4a;border-radius:8px;padding:10px 14px;margin-bottom:12px}
.preset{padding:4px 11px;border-radius:5px;border:1px solid #1b2f4a;background:transparent;color:#94a3b8;font-size:11px;font-weight:600;cursor:pointer;transition:all .12s;white-space:nowrap}
.preset.act{background:#f59e0b22;border-color:#f59e0b;color:#f59e0b}
.fpill{display:inline-flex;align-items:center;gap:5px;padding:4px 11px;border-radius:16px;border:1px solid #1b2f4a;background:#0d1524;color:#94a3b8;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap}
.fpill.on{border-color:#f59e0b;background:#f59e0b22;color:#f59e0b}
.dd-wrap{position:relative;display:inline-block}
.dd-menu{display:none;position:absolute;top:110%;left:0;background:#0d1524;border:1px solid #1b2f4a;border-radius:8px;padding:8px;z-index:300;min-width:175px;max-height:250px;overflow-y:auto;box-shadow:0 8px 24px rgba(0,0,0,.6)}
.dd-menu.open{display:block}
.ddi{display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:5px;cursor:pointer;font-size:12px;color:#e2e8f0}
.ddi:hover{background:#1b2f4a}
.ddi input[type=checkbox]{accent-color:#f59e0b;width:14px;height:14px;cursor:pointer}
.fchip{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:10px;font-size:11px;font-weight:600;cursor:pointer}
.brbtn{display:flex;align-items:center;gap:8px;padding:7px 14px;border-radius:10px;cursor:pointer;border:2px solid;background:transparent;transition:all .15s}
.exp-st{padding:6px 16px;border-radius:6px;border:1px solid #1b2f4a;background:transparent;color:#64748b;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap}
.exp-st.act{background:#f59e0b22;border-color:#f59e0b;color:#f59e0b}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh}

/* ── Mobile responsive ── */
@media(max-width:900px){
  body{font-size:12px}
  nav{padding:0 10px;height:auto;flex-wrap:wrap;gap:0}
  .logo{font-size:9px;margin-right:8px}
  .logo img{width:28px!important;height:28px!important}
  .tab{padding:0 9px;height:42px;font-size:10px}
  .pg{padding:10px 12px;max-width:100%}
  .card,.sm{padding:10px}
  .ct{font-size:9px;margin-bottom:8px}
  .g4{grid-template-columns:1fr 1fr;gap:8px}
  .g2{grid-template-columns:1fr;gap:10px}
  .tbl{font-size:11px}
  .tbl th{padding:5px 6px;font-size:9px}
  .tbl td{padding:5px 6px}
  .fbar{padding:8px 10px}
  .preset{padding:3px 9px;font-size:10px}
  .fpill{padding:3px 9px;font-size:10px}
  .brbtn{padding:6px 10px}
  .brbtn img{width:30px!important;height:30px!important}
}
@media(max-width:900px){
  .aov-grid{grid-template-columns:repeat(2,minmax(0,1fr))!important;gap:8px!important}
}
.aov-grid{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:10px}
@media(max-width:900px){
  .aov-grid{grid-template-columns:repeat(3,minmax(0,1fr))!important}
}
@media(max-width:560px){
  .aov-grid{grid-template-columns:repeat(2,minmax(0,1fr))!important;gap:6px}
  .aov-grid > div{padding:8px!important}
  body{font-size:11px}
  nav{padding:0 8px;height:auto}
  .logo span{display:none}
  .aov-grid{grid-template-columns:1fr!important;gap:8px!important}
  .tab{padding:0 6px;height:40px;font-size:9px}
  .pg{padding:8px 10px}
  .g4{grid-template-columns:1fr 1fr;gap:6px}
  .card,.sm{padding:8px;margin-bottom:8px}
  .tbl th,.tbl td{padding:4px 5px;font-size:10px}
  /* Stack KPI label/value */
  .sm > div:nth-child(2){font-size:16px!important}
  /* Hide some less critical columns in tables on small screens */
  .tbl th:nth-child(n+6),.tbl td:nth-child(n+6){display:none}
}
@media(max-width:400px){
  /* Hide even more columns on very narrow screens */
  .tbl th:nth-child(n+5),.tbl td:nth-child(n+5){display:none}
}
</style>
</head>
<body>

<!-- Login Screen -->
<div id="login-screen" style="position:fixed;inset:0;background:#060c14;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999">
  <div style="font-size:14px;color:#f59e0b;font-weight:800;letter-spacing:3px;text-transform:uppercase;margin-bottom:6px">OREGANO RESTAURANTS</div>
  <div style="font-size:13px;color:#94a3b8;font-weight:500;letter-spacing:.5px;margin-bottom:32px">BD Dashboard — Sign In</div>
  <div style="background:#0d1524;border:1px solid #1b2f4a;border-radius:12px;padding:28px;width:min(360px,90vw)">
    <div style="margin-bottom:14px">
      <label style="display:block;font-size:10px;color:#94a3b8;text-transform:uppercase;letter-spacing:1px;font-weight:700;margin-bottom:6px">Username</label>
      <input type="text" id="login-user" placeholder="Enter your name" autocomplete="username" style="width:100%;background:#060c14;border:1px solid #1b2f4a;border-radius:6px;color:#e2e8f0;padding:10px 12px;font-size:14px;outline:none" onfocus="this.style.borderColor='#f59e0b'" onblur="this.style.borderColor='#1b2f4a'">
    </div>
    <div style="margin-bottom:20px">
      <label style="display:block;font-size:10px;color:#94a3b8;text-transform:uppercase;letter-spacing:1px;font-weight:700;margin-bottom:6px">Password</label>
      <input type="password" id="login-pass" placeholder="Enter password" autocomplete="current-password" style="width:100%;background:#060c14;border:1px solid #1b2f4a;border-radius:6px;color:#e2e8f0;padding:10px 12px;font-size:14px;outline:none" onfocus="this.style.borderColor='#f59e0b'" onblur="this.style.borderColor='#1b2f4a'" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button onclick="doLogin()" style="width:100%;background:#f59e0b;border:none;border-radius:6px;color:#000;font-weight:700;font-size:13px;padding:11px;cursor:pointer;letter-spacing:.5px;text-transform:uppercase">Sign In</button>
    <div id="login-err" style="color:#ef4444;font-size:11px;margin-top:10px;text-align:center;min-height:14px"></div>
  </div>
  <div style="font-size:10px;color:#475569;margin-top:24px">Authorised personnel only</div>
</div>

<!-- Welcome Screen -->
<div id="welcome-screen" style="display:none;position:fixed;inset:0;background:#060c14;flex-direction:column;align-items:center;justify-content:center;z-index:9998;padding:20px">
  <div id="welcome-avatar" style="width:80px;height:80px;border-radius:50%;background:#f59e0b;display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:800;color:#000;margin-bottom:18px"></div>
  <div id="welcome-greeting" style="font-size:11px;color:#94a3b8;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px;display:none"></div>
  <div id="welcome-name" style="font-size:26px;font-weight:700;color:#f59e0b;margin-bottom:20px;text-align:center"></div>
  <div id="welcome-joke" style="font-size:17px;color:#FCD34D;max-width:640px;text-align:center;line-height:1.6;font-style:italic;padding:22px 28px;background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.25);border-radius:14px;margin-bottom:24px;display:flex;align-items:center;gap:14px;justify-content:center;flex-wrap:wrap;min-height:60px">
    <span id="welcome-joke-text" style="font-weight:500"></span><span id="welcome-cursor" style="display:inline-block;width:2px;height:20px;background:#FCD34D;animation:cursor-blink 0.7s steps(1) infinite;vertical-align:middle"></span>
    <div id="welcome-emoji" style="display:none;width:64px;height:64px;flex-shrink:0;filter:drop-shadow(0 6px 12px rgba(245,158,11,0.5)) drop-shadow(0 2px 4px rgba(0,0,0,0.3))">
      <svg viewBox="0 0 100 100" width="64" height="64" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="faceGrad" cx="40%" cy="35%" r="70%">
            <stop offset="0%" stop-color="#FFE76A"/>
            <stop offset="50%" stop-color="#FFC83D"/>
            <stop offset="100%" stop-color="#D89400"/>
          </radialGradient>
          <radialGradient id="cheekGrad" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#FF8B7B" stop-opacity="0.6"/>
            <stop offset="100%" stop-color="#FF8B7B" stop-opacity="0"/>
          </radialGradient>
        </defs>
        <!-- Face sphere -->
        <circle cx="50" cy="50" r="45" fill="url(#faceGrad)"/>
        <!-- Specular highlight (top-left) -->
        <ellipse cx="35" cy="28" rx="14" ry="9" fill="white" opacity="0.35"/>
        <!-- Cheeks -->
        <circle cx="28" cy="62" r="7" fill="url(#cheekGrad)"/>
        <circle cx="72" cy="62" r="7" fill="url(#cheekGrad)"/>
        <!-- LEFT EYE — always open -->
        <ellipse cx="35" cy="45" rx="4" ry="5.5" fill="#1a1a1a"/>
        <circle cx="36" cy="43" r="1.5" fill="white" opacity="0.9"/>
        <!-- RIGHT EYE — winks! -->
        <g id="wink-eye">
          <ellipse id="wink-eye-open" cx="65" cy="45" rx="4" ry="5.5" fill="#1a1a1a"/>
          <circle id="wink-eye-shine" cx="66" cy="43" r="1.5" fill="white" opacity="0.9"/>
          <path id="wink-eye-closed" d="M 60 45 Q 65 47.5 70 45" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0"/>
        </g>
        <!-- Smile -->
        <path d="M 32 64 Q 50 78 68 64" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round" fill="none"/>
        <!-- Smile shine -->
        <path d="M 36 67 Q 50 74 64 67" stroke="#FFE76A" stroke-width="1" stroke-linecap="round" fill="none" opacity="0.4"/>
      </svg>
    </div>
  </div>
  <style>
    @keyframes joke-wink-eye{
      0%,55%{opacity:1}
      60%,68%{opacity:0}
      72%,100%{opacity:1}
    }
    @keyframes joke-wink-eye-shine{
      0%,55%{opacity:0.9}
      60%,68%{opacity:0}
      72%,100%{opacity:0.9}
    }
    @keyframes joke-wink-closed{
      0%,55%{opacity:0}
      60%,68%{opacity:1}
      72%,100%{opacity:0}
    }
    @keyframes joke-bounce{
      0%,55%,72%,100%{transform:translateY(0) rotate(0deg)}
      60%{transform:translateY(-3px) rotate(-3deg)}
      66%{transform:translateY(-1px) rotate(-1deg)}
    }
    @keyframes cursor-blink{
      0%,49%{opacity:1}
      50%,100%{opacity:0}
    }
    .laugh-active #wink-eye-open{animation:joke-wink-eye 2.4s ease-in-out infinite}
    .laugh-active #wink-eye-shine{animation:joke-wink-eye-shine 2.4s ease-in-out infinite}
    .laugh-active #wink-eye-closed{animation:joke-wink-closed 2.4s ease-in-out infinite}
    .laugh-active svg{animation:joke-bounce 2.4s ease-in-out infinite}
  </style>
  <div style="font-size:11px;color:#64748b">Loading your dashboard...</div>
</div>

<div id="loading-screen" class="loading" style="display:none">
  <div style="font-size:14px;color:#f59e0b;font-weight:800;letter-spacing:3px;text-transform:uppercase;margin-bottom:6px">OREGANO RESTAURANTS</div>
  <div style="font-size:13px;color:#94a3b8;font-weight:500;letter-spacing:.5px;margin-bottom:24px">BD Dashboard</div>
  <div id="loading-logos" style="display:flex;gap:14px;align-items:center;justify-content:center;flex-wrap:wrap;margin-bottom:28px;max-width:90vw"></div>
  <div style="color:#64748b;font-size:12px">Loading live data from Google Sheets...</div>
  <div style="width:min(220px,80vw);background:#1b2f4a;border-radius:4px;height:3px;margin-top:18px">
    <div id="pbar" style="width:0%;background:#f59e0b;height:3px;border-radius:4px;transition:width .4s"></div>
  </div>
  <div id="ptxt" style="color:#64748b;font-size:11px;margin-top:7px">0 / 5 brands</div>
  <div id="perr" style="color:#ef4444;font-size:11px;margin-top:8px;text-align:center;max-width:90vw;padding:0 16px"></div>
</div>

<div id="main-app" style="display:none">
  <nav>
    <div class="logo"><img id="nav-logo" style="width:34px;height:34px;border-radius:6px;object-fit:cover"><span>Oregano<br>Restaurants</span></div>
    <button class="tab act" onclick="gp('overview')">Overview</button>
    <button class="tab" onclick="gp('brands')">Brands</button>
    <button class="tab" onclick="gp('outlets')">Outlets</button>
    <button class="tab" onclick="gp('platforms')">Platforms</button>
    <button class="tab" onclick="gp('cpc')">Ads Performance</button>
    <button class="tab" onclick="gp('campaigns')">📅 Campaigns</button>
    <button class="tab" onclick="gp('kpi')">📊 KPI Tracker</button>
    <div style="flex:1"></div>
    <span id="ts-label" style="font-size:10px;color:#64748b"></span>
    <button onclick="doLoad()" style="margin-left:10px;background:none;border:1px solid #1b2f4a;border-radius:4px;color:#64748b;padding:3px 10px;font-size:12px;cursor:pointer">↻ Refresh</button>
    <button onclick="doLogout()" style="margin-left:6px;background:none;border:1px solid #1b2f4a;border-radius:4px;color:#64748b;padding:3px 10px;font-size:12px;cursor:pointer" title="Sign out">⎋</button>
  </nav>
  <div id="page-overview" class="pg act"></div>
  <div id="page-brands" class="pg"></div>
  <div id="page-outlets" class="pg"></div>
  <div id="page-platforms" class="pg"></div>
  <div id="page-cpc" class="pg"></div>
  <div id="page-campaigns" class="pg"></div>
  <div id="page-kpi" class="pg"></div>
</div>

  const user=(document.getElementById("login-user").value||"").trim().toLowerCase();

  const u=AUTH_USERS[user];

  if(h>=5&&h<12)return"Good Morning";
  if(h>=12&&h<17)return"Good Afternoon";
  if(h>=17&&h<21)return"Good Evening";
  return"Working Late?";
}

const ALREADY_SHOWN_KEY="oregano_user_jokes_seen";

function getNextJoke(username){
  // Check if this user has personalized jokes
  if(username&&USER_JOKES[username]&&USER_JOKES[username].length){
    let seen={};
    try{seen=JSON.parse(localStorage.getItem(ALREADY_SHOWN_KEY)||"{}");}catch(e){}
    const userSeen=seen[username]||[];
    const total=USER_JOKES[username].length;
    // If user has seen them all, reset
    const available=USER_JOKES[username].map((_,i)=>i).filter(i=>!userSeen.includes(i));
    const pool=available.length?available:USER_JOKES[username].map((_,i)=>i);
    const pickIdx=pool[Math.floor(Math.random()*pool.length)];
    const newSeen=available.length?[...userSeen,pickIdx]:[pickIdx];
    seen[username]=newSeen;
    try{localStorage.setItem(ALREADY_SHOWN_KEY,JSON.stringify(seen));}catch(e){}
    return USER_JOKES[username][pickIdx];
  }
  // Fallback to generic jokes for other users (Nikhil, admin, bd, etc.)
  let used=[];
  try{used=JSON.parse(localStorage.getItem("oregano_jokes_used")||"[]");}catch(e){}
  if(used.length>=JOKES.length)used=[];
  const available=JOKES.map((_,i)=>i).filter(i=>!used.includes(i));
  const pickIdx=available[Math.floor(Math.random()*available.length)];
  used.push(pickIdx);
  try{localStorage.setItem("oregano_jokes_used",JSON.stringify(used));}catch(e){}
  return JOKES[pickIdx];
}

function showWelcome(name,initials,username){
  document.getElementById("login-screen").style.display="none";
  const w=document.getElementById("welcome-screen");
  w.style.display="flex";
  document.getElementById("welcome-name").textContent=`${getGreeting()}, ${name}!`;
  document.getElementById("welcome-greeting").textContent=name;
  document.getElementById("welcome-avatar").textContent=initials;
  
  const joke=getNextJoke(username);
  const textEl=document.getElementById("welcome-joke-text");
  const cursorEl=document.getElementById("welcome-cursor");
  const emojiEl=document.getElementById("welcome-emoji");
  textEl.textContent="";
  cursorEl.style.display="inline-block";
  emojiEl.style.display="none";
  emojiEl.classList.remove("laugh-active");
  
  // Type out joke character by character
  let i=0;
  const typeSpeed=35; // ms per character
  const typer=setInterval(()=>{
    if(i<joke.length){
      textEl.textContent=joke.slice(0,i+1);
      i++;
    }else{
      clearInterval(typer);
      // Hide cursor, reveal animated laughing emoji
      cursorEl.style.display="none";
      emojiEl.style.display="inline-block";
      emojiEl.classList.add("laugh-active");
    }
  },typeSpeed);
  
  // Total time = typing time + 4 seconds to read + laugh
  const totalMs=joke.length*typeSpeed+4500;
  setTimeout(()=>{
    w.style.display="none";
    document.getElementById("loading-screen").style.display="flex";
    if(typeof doLoad==="function")doLoad();
  },totalMs);
}

function doLogout(){
  try{localStorage.removeItem("oregano_session");}catch(e){}
  location.reload();
}

// Check existing session on page load
(function checkSession(){
  try{
    const s=localStorage.getItem("oregano_session");
    if(s){
      const sess=JSON.parse(s);
      // Session valid for 7 days
      if(Date.now()-sess.loginAt<7*24*60*60*1000){
        showWelcome(sess.displayName,sess.initials,sess.user);
        return;
      }
    }
  }catch(e){}
  // Show login by default
  document.getElementById("login-screen").style.display="flex";
})();
