<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Oregano Restaurants — BD Dashboard</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#C9933A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Oregano BD">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#FAF7F0;color:#0F172A;font-family:Inter,system-ui,sans-serif;font-size:14px;font-weight:500}
nav{background:linear-gradient(135deg,#1E293B 0%,#334155 50%,#475569 100%);border-bottom:1px solid rgba(255,255,255,.08);padding:0 20px;display:flex;align-items:center;height:54px;position:sticky;top:0;z-index:100;box-shadow:0 4px 12px rgba(15,23,42,.15)}
.logo{font-weight:800;font-size:11px;color:#fbbf24;margin-right:20px;letter-spacing:2px;text-transform:uppercase;line-height:1.3;flex-shrink:0;display:flex;align-items:center;gap:8px;text-shadow:0 1px 2px rgba(0,0,0,.3)}
.tab{padding:0 14px;height:54px;border:none;background:none;cursor:pointer;font-size:12px;font-weight:700;color:rgba(255,255,255,.75);border-bottom:3px solid transparent;transition:all .15s;letter-spacing:.3px;white-space:nowrap}
.tab:hover{color:#FEFDFA}
.tab.act{color:#fbbf24;border-bottom:3px solid #fbbf24;text-shadow:0 1px 2px rgba(0,0,0,.2)}
.pg{padding:14px 20px;max-width:1600px;margin:0 auto;display:none}.pg.act{display:block}
.card{background:#FEFDFA;border:1px solid #EDE7D9;border-radius:12px;padding:16px;margin-bottom:14px;box-shadow:0 4px 6px -1px rgba(15,23,42,.06),0 2px 4px -2px rgba(15,23,42,.04)}
.sm{background:#FEFDFA;border:1px solid #EDE7D9;border-radius:12px;padding:14px;box-shadow:0 4px 6px -1px rgba(15,23,42,.06),0 2px 4px -2px rgba(15,23,42,.04);transition:all .2s ease}
.sm:hover{box-shadow:0 10px 20px -5px rgba(15,23,42,.1),0 4px 8px -4px rgba(15,23,42,.06);transform:translateY(-2px)}
.ct{font-size:13px;color:#64748B;font-weight:800;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:12px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px}
.ov-kpi-row{grid-template-columns:repeat(5,1fr)!important}
@media (max-width:900px){.ov-kpi-row{grid-template-columns:1fr 1fr!important}}
.tbl{width:100%;border-collapse:collapse;font-size:14px}
.tbl th{padding:9px 10px;text-align:left;color:#64748B;font-weight:700;font-size:12px;text-transform:uppercase;border-bottom:2px solid #EDE7D9;cursor:pointer;user-select:none}
.tbl th:hover{color:#f59e0b}
.tbl td{padding:9px 10px;border-bottom:1px solid #F5F0E5;font-variant-numeric:tabular-nums}
.tbl tr:hover td{background:rgba(139,92,20,.03)}
.vrow{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #F5F0E5}
.chip{font-size:9px;padding:2px 6px;border-radius:3px;font-weight:700;margin-right:3px}
.fbar{background:#FEFDFA;border:1px solid #EDE7D9;border-radius:10px;padding:10px 14px;margin-bottom:12px;box-shadow:0 1px 3px rgba(15,23,42,.04)}
.preset{padding:4px 11px;border-radius:5px;border:1px solid #EDE7D9;background:transparent;color:#64748B;font-size:11px;font-weight:600;cursor:pointer;transition:all .12s;white-space:nowrap}
.preset:hover{border-color:#D6CFB8;color:#475569}
.preset.act{background:#f59e0b22;border-color:#f59e0b;color:#f59e0b}
.fpill{display:inline-flex;align-items:center;gap:5px;padding:4px 11px;border-radius:16px;border:1px solid #EDE7D9;background:#FEFDFA;color:#64748B;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap}
.fpill.on{border-color:#f59e0b;background:#f59e0b22;color:#f59e0b}
.dd-wrap{position:relative;display:inline-block}
.dd-menu{display:none;position:absolute;top:110%;left:0;background:#FEFDFA;border:1px solid #EDE7D9;border-radius:10px;padding:8px;z-index:300;min-width:175px;max-height:250px;overflow-y:auto;box-shadow:0 20px 25px -5px rgba(15,23,42,.1),0 8px 10px -6px rgba(15,23,42,.1)}
.dd-menu.open{display:block}
.ddi{display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:5px;cursor:pointer;font-size:12px;color:#0F172A}
.ddi:hover{background:#F5F0E5}
.ddi input[type=checkbox]{accent-color:#f59e0b;width:14px;height:14px;cursor:pointer}
.fchip{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:10px;font-size:11px;font-weight:600;cursor:pointer}
.brbtn{display:flex;align-items:center;gap:8px;padding:7px 14px;border-radius:10px;cursor:pointer;border:2px solid;background:#FEFDFA;transition:all .15s}
.brbtn:hover{box-shadow:0 4px 12px rgba(15,23,42,.08);transform:translateY(-1px)}
.exp-st{padding:6px 16px;border-radius:6px;border:1px solid #EDE7D9;background:transparent;color:#64748B;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap}
.exp-st.act{background:#f59e0b22;border-color:#f59e0b;color:#f59e0b}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;width:100%;position:fixed;top:0;left:0;right:0;bottom:0}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:#F5F0E5}::-webkit-scrollbar-thumb{background:#D6CFB8;border-radius:3px}::-webkit-scrollbar-thumb:hover{background:#94A3B8}

/* ── Mobile-nav drawer buttons ── */
.mnav{display:flex;align-items:center;gap:12px;width:100%;padding:12px 14px;margin-bottom:2px;background:none;border:none;border-radius:8px;color:rgba(255,255,255,.7);font-size:13px;font-weight:700;cursor:pointer;text-align:left;transition:all .15s;font-family:inherit;letter-spacing:.2px}
.mnav:hover{background:rgba(255,255,255,.06);color:#FEFDFA}
.mnav.act{background:linear-gradient(90deg,rgba(251,191,36,.15),transparent);color:#fbbf24;border-left:3px solid #fbbf24;padding-left:11px}

/* Menu button attention-pulse — plays twice on first load to draw the eye */
@keyframes menuPulse{0%,100%{box-shadow:0 0 0 0 rgba(251,191,36,0)}50%{box-shadow:0 0 0 8px rgba(251,191,36,.25)}}

/* ── Mobile responsive ── */
@media(max-width:900px){
  body{font-size:12px}
  /* Hide nav tabs on mobile — the hamburger drawer replaces them */
  nav{padding:0 8px;height:64px;flex-wrap:nowrap;gap:0;justify-content:flex-start}
  nav .tab{display:none}
  #mobile-menu-btn{display:inline-flex!important;animation:menuPulse 2.5s ease-in-out 2;padding:5px 9px!important;font-size:12px!important}
  #mobile-menu-btn span:first-child{font-size:16px!important}
  #nav-brand-strip{display:flex!important;overflow:visible!important}
  nav::after{display:none!important} /* remove scroll-fade on mobile */
  #ts-label{display:none}
  nav > button:not(#mobile-menu-btn){display:none} /* hide refresh/logout on mobile — they're in the drawer */
  .logo{font-size:10px;margin-left:8px;margin-right:4px;flex-shrink:0;min-width:0;overflow:hidden}
  .logo span{display:none} /* hide "Oregano Restaurants" text on mobile — brand strip takes the space instead */
  .logo img{width:40px!important;height:40px!important;flex-shrink:0}
  .nav-brand-logo{height:40px!important;width:40px!important;object-fit:cover!important;border-radius:9px!important;flex-shrink:0}
  .pg{padding:12px 12px;max-width:100%}
  .card,.sm{padding:12px;border-radius:10px}
  .ct{font-size:10px;margin-bottom:8px}
  .g4{grid-template-columns:1fr 1fr;gap:8px}
  .g2{grid-template-columns:1fr;gap:10px}
  .tbl{font-size:11px}
  .tbl th{padding:5px 6px;font-size:9px}
  .tbl td{padding:5px 6px}
  .fbar{padding:10px 12px}
  .preset{padding:5px 11px;font-size:11px}
  .fpill{padding:5px 11px;font-size:11px}
  .brbtn{padding:6px 10px}
  .brbtn img{width:30px!important;height:30px!important}
}
@media(max-width:900px){
  .aov-grid{grid-template-columns:repeat(2,minmax(0,1fr))!important;gap:8px!important}
}
.aov-grid{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:10px}
@media(max-width:900px){
  .aov-grid{grid-template-columns:repeat(3,minmax(0,1fr))!important}
}
@media(max-width:560px){
  .aov-grid{grid-template-columns:repeat(2,minmax(0,1fr))!important;gap:6px}
  .aov-grid > div{padding:8px!important}
  body{font-size:11px}
  nav{padding:0 8px;height:64px}
  .logo span{display:none}
  .aov-grid{grid-template-columns:1fr!important;gap:8px!important}
  .pg{padding:8px 10px}
  .g4{grid-template-columns:1fr 1fr;gap:6px}
  .card,.sm{padding:10px;margin-bottom:10px;border-radius:10px}
  .tbl th,.tbl td{padding:4px 5px;font-size:10px}
  .sm > div:nth-child(2){font-size:16px!important}
  .tbl th:nth-child(n+6),.tbl td:nth-child(n+6){display:none}
}
@media(max-width:400px){
  .tbl th:nth-child(n+5),.tbl td:nth-child(n+5){display:none}
  .nav-brand-logo{height:34px!important;width:34px!important}
  .logo img{width:36px!important;height:36px!important}
  #nav-brand-strip{padding:0 2px!important}
  #mobile-menu-btn span:last-child{display:none} /* on tiny screens, just show ☰ icon */
  #mobile-menu-btn{padding:5px 8px!important}
}
</style>
</head>
<body>

<!-- Login Screen -->
<div id="login-screen" style="position:fixed;inset:0;background:linear-gradient(135deg,#FAF7F0 0%,#EDE7D9 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999">
  <div style="font-size:14px;color:#f59e0b;font-weight:800;letter-spacing:3px;text-transform:uppercase;margin-bottom:6px">OREGANO RESTAURANTS</div>
  <div style="font-size:13px;color:#475569;font-weight:500;letter-spacing:.5px;margin-bottom:32px">BD Dashboard — Sign In</div>
  <div style="background:#FEFDFA;border:1px solid #EDE7D9;border-radius:12px;padding:28px;width:min(360px,90vw);box-shadow:0 20px 25px -5px rgba(15,23,42,.1),0 8px 10px -6px rgba(15,23,42,.1)">
    <div style="margin-bottom:14px">
      <label style="display:block;font-size:10px;color:#94a3b8;text-transform:uppercase;letter-spacing:1px;font-weight:700;margin-bottom:6px">Username</label>
      <input type="text" id="login-user" placeholder="Enter your name" autocomplete="username" style="width:100%;background:#FAF7F0;border:1px solid #EDE7D9;border-radius:6px;color:#0F172A;padding:10px 12px;font-size:14px;outline:none" onfocus="this.style.borderColor='#f59e0b'" onblur="this.style.borderColor='#EDE7D9'">
    </div>
    <div style="margin-bottom:20px">
      <label style="display:block;font-size:10px;color:#94a3b8;text-transform:uppercase;letter-spacing:1px;font-weight:700;margin-bottom:6px">Password</label>
      <input type="password" id="login-pass" placeholder="Enter password" autocomplete="current-password" style="width:100%;background:#FAF7F0;border:1px solid #EDE7D9;border-radius:6px;color:#0F172A;padding:10px 12px;font-size:14px;outline:none" onfocus="this.style.borderColor='#f59e0b'" onblur="this.style.borderColor='#EDE7D9'" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button onclick="doLogin()" style="width:100%;background:#f59e0b;border:none;border-radius:6px;color:#000;font-weight:700;font-size:13px;padding:11px;cursor:pointer;letter-spacing:.5px;text-transform:uppercase">Sign In</button>
    <div id="login-err" style="color:#ef4444;font-size:11px;margin-top:10px;text-align:center;min-height:14px"></div>
  </div>
  <div style="font-size:10px;color:#94A3B8;margin-top:24px">Authorised personnel only</div>
</div>


<div id="loading-screen" class="loading" style="display:none"></div>

<div id="main-app" style="display:none">
  <nav>
    <button id="mobile-menu-btn" onclick="toggleMobileNav()" style="display:none;background:rgba(251,191,36,.15);border:1px solid rgba(251,191,36,.35);color:#fbbf24;font-size:14px;cursor:pointer;padding:6px 12px;font-weight:800;border-radius:8px;align-items:center;gap:6px;letter-spacing:.5px" title="Menu"><span style="font-size:18px;line-height:1">☰</span><span>MENU</span></button>
    <div class="logo"><img id="nav-logo" style="width:44px;height:44px;border-radius:10px;object-fit:cover;box-shadow:0 2px 6px rgba(0,0,0,.35)"><span>Oregano<br>Restaurants</span></div>
    <div id="nav-brand-strip" style="display:none;flex:1;justify-content:space-around;align-items:center;padding:0 4px;min-width:0;gap:8px">
      <img class="nav-brand-logo" data-brand="Lollorosso" style="height:40px;width:40px;border-radius:10px;object-fit:cover;box-shadow:0 2px 6px rgba(0,0,0,.35);flex-shrink:0">
      <img class="nav-brand-logo" data-brand="Smokeys" style="height:40px;width:40px;border-radius:10px;object-fit:cover;box-shadow:0 2px 6px rgba(0,0,0,.35);flex-shrink:0">
      <img class="nav-brand-logo" data-brand="Fyoozhen" style="height:40px;width:40px;border-radius:10px;object-fit:cover;box-shadow:0 2px 6px rgba(0,0,0,.35);flex-shrink:0">
      <img class="nav-brand-logo" data-brand="Wicked Wings" style="height:40px;width:40px;border-radius:10px;object-fit:cover;box-shadow:0 2px 6px rgba(0,0,0,.35);flex-shrink:0">
    </div>
    <button class="tab act" onclick="gp('overview')">Overview</button>
    <button class="tab" onclick="gp('brands')">Brands</button>
    <button class="tab" onclick="gp('outlets')">Outlets</button>
    <button class="tab" onclick="gp('platforms')">Platforms</button>
    <button class="tab" onclick="gp('cpc')">Ads Performance</button>
    <button class="tab" onclick="gp('campaigns')">📅 Campaigns</button>
    <button class="tab" onclick="gp('discounts')">💸 Discount Burn</button>
    <button class="tab" onclick="gp('kpi')">📊 KPI Tracker</button>
    <button class="tab" onclick="gp('compare')">⚖️ Compare</button>
    <div style="flex:1"></div>
    <span id="ts-label" style="font-size:10px;color:rgba(255,255,255,.7)"></span>

    <button onclick="doLogout()" style="margin-left:6px;background:none;border:1px solid rgba(255,255,255,.2);border-radius:4px;color:rgba(255,255,255,.85);padding:3px 10px;font-size:12px;cursor:pointer" title="Sign out">⎋</button>
  </nav>

  <!-- MOBILE SLIDE-OUT NAV DRAWER -->
  <div id="mobile-nav-overlay" onclick="toggleMobileNav()" style="display:none;position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:998;opacity:0;transition:opacity .25s ease"></div>
  <div id="mobile-nav-drawer" style="display:none;position:fixed;top:0;left:-280px;width:280px;height:100vh;background:linear-gradient(180deg,#1E293B 0%,#0F172A 100%);z-index:999;transition:left .25s ease;box-shadow:4px 0 24px rgba(0,0,0,.3);flex-direction:column">
    <div style="padding:20px 20px 24px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:12px">
      <img id="drawer-logo" style="width:40px;height:40px;border-radius:8px;object-fit:cover">
      <div><div style="font-size:14px;font-weight:800;color:#fbbf24;letter-spacing:1.5px">OREGANO</div><div style="font-size:11px;color:rgba(255,255,255,.6);font-weight:600">Restaurants BD</div></div>
    </div>
    <div style="flex:1;padding:12px 8px;overflow-y:auto">
      <button class="mnav" data-pg="overview" onclick="mNavGo('overview')"><span style="font-size:18px">🏠</span><span>Overview</span></button>
      <button class="mnav" data-pg="brands" onclick="mNavGo('brands')"><span style="font-size:18px">🏷️</span><span>Brands</span></button>
      <button class="mnav" data-pg="outlets" onclick="mNavGo('outlets')"><span style="font-size:18px">📍</span><span>Outlets</span></button>

      <button class="mnav" data-pg="cpc" onclick="mNavGo('cpc')"><span style="font-size:18px">📈</span><span>Ads Performance</span></button>
      <button class="mnav" data-pg="campaigns" onclick="mNavGo('campaigns')"><span style="font-size:18px">📅</span><span>Campaigns</span></button>
      <button class="mnav" data-pg="discounts" onclick="mNavGo('discounts')"><span style="font-size:18px">💸</span><span>Discount Burn</span></button>

      <button class="mnav" data-pg="compare" onclick="mNavGo('compare')"><span style="font-size:18px">⚖️</span><span>Compare</span></button>
    </div>
    <div style="padding:14px 20px;border-top:1px solid rgba(255,255,255,.08);display:flex;gap:8px">
      <button onclick="doLoad();toggleMobileNav()" style="flex:1;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:8px;color:#FEFDFA;padding:8px;font-size:12px;font-weight:700;cursor:pointer">↻ Refresh</button>
      <button onclick="doLogout()" style="background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);border-radius:8px;color:#F87171;padding:8px 12px;font-size:12px;font-weight:700;cursor:pointer" title="Sign out">⎋</button>
    </div>
  </div>

  <div id="page-overview" class="pg act"></div>
  <div id="page-brands" class="pg"></div>
  <div id="page-outlets" class="pg"></div>
  <div id="page-platforms" class="pg"></div>
  <div id="page-cpc" class="pg"></div>
  <div id="page-campaigns" class="pg"></div>
  <div id="page-discounts" class="pg"></div>
  <div id="page-kpi" class="pg"></div>
  <div id="page-compare" class="pg"></div>
</div>

// ── AUTHENTICATION ──
// Credentials are validated SERVER-SIDE by the Cloudflare Worker (worker.js).
// AUTH_USERS no longer lives in this file — passwords are never sent to clients.
async function doLogin(){
  const user=(document.getElementById("login-user").value||"").trim().toLowerCase();
  const pass=document.getElementById("login-pass").value||"";
  const err=document.getElementById("login-err");
  const btn=document.querySelector("#login-screen button");
  if(!user||!pass){err.textContent="Enter username and password";return;}
  err.textContent="";if(btn){btn.disabled=true;btn.textContent="Signing in…";}
  try{
    const res=await fetch("/api/login",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({user,password:pass})
    });
    const data=await res.json();
    if(!res.ok){err.textContent=data.error||"Invalid username or password";return;}
    // Server returned a session — store it locally and proceed
    try{localStorage.setItem("oregano_session",JSON.stringify({
      sessionId:data.sessionId,
      user:data.user,
      displayName:data.displayName,
      initials:data.initials,
      admin:!!data.admin,
      loginAt:Date.now()
    }));}catch(e){}
    document.getElementById("login-screen").style.display="none";
    document.getElementById("loading-screen").style.display="flex";
    if(typeof doLoad==="function")doLoad();
  }catch(e){
    err.textContent="Network error — try again";
  }finally{
    if(btn){btn.disabled=false;btn.textContent="Sign In";}
  }
}

async function doLogout(){
  // Tell the server to invalidate this session (best-effort)
  try{
    const s=JSON.parse(localStorage.getItem("oregano_session")||"{}");
    if(s.sessionId){
      await fetch("/api/logout",{method:"POST",headers:{"X-Session-Id":s.sessionId}});
    }
  }catch(e){}
  try{localStorage.removeItem("oregano_session");}catch(e){}
  location.reload();
}

// On page load, validate any existing session with the server. The dashboard.js
// session-heartbeat loop will keep validating every 60s after the dashboard loads.
(function checkSession(){
  try{
    const s=localStorage.getItem("oregano_session");
    if(s){
      const sess=JSON.parse(s);
      // Old-format sessions (no sessionId) get force-logged-out for re-auth via server
      if(sess&&sess.sessionId){
        document.getElementById("login-screen").style.display="none";
        document.getElementById("loading-screen").style.display="flex";
        const fire=()=>{if(typeof doLoad==="function")doLoad();};
        if(document.readyState==="loading"){
          document.addEventListener("DOMContentLoaded",fire);
        }else{
          fire();
        }
        return;
      }
      // Old client-only session detected → clear it so user re-logs in via server
      localStorage.removeItem("oregano_session");
    }
  }catch(e){}
  document.getElementById("login-screen").style.display="flex";
})();
