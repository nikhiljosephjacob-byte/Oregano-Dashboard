*{box-sizing:border-box;margin:0;padding:0}
body{background:#060c14;color:#e2e8f0;font-family:Inter,system-ui,sans-serif;font-size:13px}
nav{background:#0d1524;border-bottom:1px solid #1b2f4a;padding:0 20px;display:flex;align-items:center;height:50px;position:sticky;top:0;z-index:100;gap:0}
.logo{font-weight:800;font-size:10px;color:#f59e0b;margin-right:20px;letter-spacing:2px;text-transform:uppercase;line-height:1.3;flex-shrink:0;display:flex;align-items:center;gap:8px}
.tab{padding:0 14px;height:50px;border:none;background:none;cursor:pointer;font-size:11px;font-weight:700;color:#64748b;border-bottom:2px solid transparent;letter-spacing:.3px;transition:all .12s}
.tab.act{color:#f59e0b;border-bottom:2px solid #f59e0b}
.pg{padding:14px 20px;max-width:1300px;display:none}
.pg.act{display:block}
.card{background:#0d1524;border:1px solid #1b2f4a;border-radius:8px;padding:14px;margin-bottom:12px}
.sm{background:#0d1524;border:1px solid #1b2f4a;border-radius:8px;padding:12px}
.ct{font-size:10px;color:#64748b;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{padding:7px 8px;text-align:left;color:#64748b;font-weight:700;font-size:10px;text-transform:uppercase;border-bottom:1px solid #1b2f4a;cursor:pointer;user-select:none;white-space:nowrap}
.tbl th:hover{color:#f59e0b}
.tbl td{padding:7px 8px;border-bottom:1px solid rgba(27,47,74,.5);font-variant-numeric:tabular-nums}
.tbl tr:hover td{background:rgba(27,47,74,.3)}
.vrow{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid rgba(27,47,74,.4)}
.chip{font-size:9px;padding:2px 6px;border-radius:3px;font-weight:700;margin-right:3px}
.fbar{background:#0d1524;border:1px solid #1b2f4a;border-radius:8px;padding:10px 14px;margin-bottom:12px}
.preset{padding:4px 11px;border-radius:5px;border:1px solid #1b2f4a;background:transparent;color:#94a3b8;font-size:11px;font-weight:600;cursor:pointer;transition:all .12s;white-space:nowrap}
.preset.act{background:#f59e0b22;border-color:#f59e0b;color:#f59e0b}
.fpill{display:inline-flex;align-items:center;gap:5px;padding:4px 11px;border-radius:16px;border:1px solid #1b2f4a;background:#0d1524;color:#94a3b8;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap}
.fpill.on{border-color:#f59e0b;background:#f59e0b22;color:#f59e0b}
.dd-wrap{position:relative;display:inline-block}
.dd-menu{display:none;position:absolute;top:110%;left:0;background:#0d1524;border:1px solid #1b2f4a;border-radius:8px;padding:8px;z-index:300;min-width:175px;max-height:250px;overflow-y:auto;box-shadow:0 8px 24px rgba(0,0,0,.6)}
.dd-menu.open{display:block}
.ddi{display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:5px;cursor:pointer;font-size:12px;color:#e2e8f0}
.ddi:hover{background:#1b2f4a}
.ddi input[type=checkbox]{accent-color:#f59e0b;width:14px;height:14px;cursor:pointer}
.fchip{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:10px;font-size:11px;font-weight:600;cursor:pointer}
.brbtn{display:flex;align-items:center;gap:8px;padding:7px 14px;border-radius:10px;cursor:pointer;border:2px solid;background:transparent;transition:all .15s}
.exp-st{padding:5px 14px;border-radius:6px;border:1px solid #1b2f4a;background:transparent;color:#64748b;font-size:12px;font-weight:600;cursor:pointer}
.exp-st.act{background:#f59e0b22;border-color:#f59e0b;color:#f59e0b}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh}
@media(max-width:700px){.g4{grid-template-columns:1fr 1fr}.g2{grid-template-columns:1fr}}

// ── UTILS ──
const normB=n=>BNM[n]||n;
const toN=s=>{const v=parseFloat((s||"").replace(/[,\s]/g,""));return isNaN(v)?0:v;};
function parseDate(s){if(!s)return null;const m=String(s).trim().match(/^(\d{1,2})-([A-Za-z]{3})-(\d{2,4})$/);if(m){let y=parseInt(m[3]);if(y<100)y=y>50?1900+y:2000+y;const mo=MM[m[2]];if(mo!=null)return new Date(y,mo,parseInt(m[1]));}const d=new Date(s);return isNaN(d)?null:d;}
function dk(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;}
function subDays(k,n){const d=new Date(k+"T12:00:00");d.setDate(d.getDate()-n);return dk(d);}
function fmtDisp(k){if(!k)return"";return new Date(k+"T12:00:00").toLocaleDateString("en-AE",{weekday:"short",day:"numeric",month:"short",year:"numeric"});}
function fmtAED(n){if(n>=1e6)return`AED ${(n/1e6).toFixed(2)}M`;if(n>=1000)return`AED ${(n/1000).toFixed(1)}K`;return`AED ${Math.round(n)}`;}
function pctOf(a,b){if(!b||b===0)return null;return((a-b)/b)*100;}
function fmtPct(n,d="—"){if(n==null)return d;return`${n>=0?"+":""}${n.toFixed(1)}%`;}
function pctClr(n){if(n==null)return"#64748b";if(n>=15)return"#22C55E";if(n>=3)return"#86EFAC";if(n>=0)return"#A3E635";if(n>=-15)return"#FBBF24";return"#EF4444";}

// ── CSV PARSING ──
function parseCSV(txt){const rows=[];let row=[],c="",q=false;for(let i=0;i<txt.length;i++){const ch=txt[i];if(ch==='"')q=!q;else if(ch===","&&!q){row.push(c.trim());c="";}else if((ch==="\n"||ch==="\r")&&!q){if(ch==="\r"&&txt[i+1]==="\n")i++;row.push(c.trim());c="";if(row.some(x=>x))rows.push(row);row=[];}else c+=ch;}row.push(c.trim());if(row.some(x=>x))rows.push(row);return rows;}
function parseBrand(csv,brand){
  const rows=parseCSV(csv);const AS=new Set(AGGS);
  let ai=-1;for(let i=0;i<Math.min(rows.length,15);i++){if(rows[i].some(v=>AS.has(v)||AS_LC.has(v.toLowerCase()))){ai=i;break;}}
  if(ai<0)return[];
  const ar=rows[ai],sr=rows[ai+1]||[];
  const AS_LC2=new Map([...AS].map(a=>[a.toLowerCase(),a]));
  let cur="";
  const pa=ar.map(v=>{const t=v.trim(),tl=t.toLowerCase();if(AS_LC2.has(tl))cur=AS_LC2.get(tl);else if(t)cur="";return cur;});
  const cols=pa.reduce((a,agg,i)=>{if(agg&&(sr[i]==="Sales"||sr[i]==="Orders"))a.push({i,agg,m:sr[i]});return a;},[]);
  const recs=[];
  for(let i=ai+2;i<rows.length;i++){
    const row=rows[i];const br=normB(row[0]?.trim()||"");
    if(!br||SKIP_BR.has(br.toLowerCase().trim()))continue;
    const date=parseDate(row[1]);if(!date)continue;const key=dk(date);
    const am={};cols.forEach(({i:idx,agg,m})=>{if(!am[agg])am[agg]={Sales:0,Orders:0};am[agg][m]=toN(row[idx]);});
    Object.entries(am).forEach(([agg,d])=>{if(d.Sales>0||d.Orders>0)recs.push({brand,branch:br,date:key,aggregator:agg,sales:d.Sales,orders:d.Orders,aov:d.Orders>0?d.Sales/d.Orders:0});});
  }return recs;
}
const AS_LC=new Map(AGGS.map(a=>[a.toLowerCase(),a]));

// ── FETCHING ──
async function fetchCSV(gid){
  const raw=`${PUB}?gid=${gid}&single=true&output=csv`;
  const proxies=[raw,`https://api.allorigins.win/raw?url=${encodeURIComponent(raw)}`,`https://corsproxy.io/?${encodeURIComponent(raw)}`,`https://thingproxy.freeboard.io/fetch/${raw}`];
  for(const u of proxies){try{const r=await fetch(u);if(r.ok){const t=await r.text();if(t.length>200&&t.includes(","))return t;}}catch(e){}}
  throw new Error("blocked");
}

  document.getElementById("loading-screen").style.display="flex";
  document.getElementById("main-app").style.display="none";
  const pb=document.getElementById("pbar"),pt=document.getElementById("ptxt"),pe=document.getElementById("perr");

  await Promise.all(BR.map(async({n,gid},idx)=>{
    try{all.push(...parseBrand(await fetchCSV(gid),n));}
    catch(e){errs.push(`${n}: ${e.message}`);}
    pb.style.width=`${((idx+1)/5)*100}%`;pt.textContent=`${idx+1} / 5 brands`;

      <b style="color:#f59e0b">Get your live link:</b><br>

      2. Drag the HTML file onto the page<br>
      3. Bookmark your URL ✓
    </div>`;
    return;

  latest=all.reduce((m,r)=>r.date>m?r.date:m,all[0].date);
  fEnd=latest;fStart=latest;fPreset="yesterday";

  const lat=all.reduce((m,r)=>r.date>m?r.date:m,all[0].date);

// ── STATE ──
let allData=[],latest=null,curPage="overview",charts={};
let selBrand="Oregano",selPlatform="Deliveroo";
// Global filters
let fStart=null,fEnd=null,fPreset="yesterday";
let fBrands=new Set(),fPlatforms=new Set(),fBranches=new Set();

// ── GLOBAL FILTER HELPERS ──
function getLD(){
  return allData.filter(r=>{
    if(fStart&&r.date<fStart)return false;
    if(fEnd&&r.date>fEnd)return false;
    if(fBrands.size&&!fBrands.has(r.brand))return false;
    if(fPlatforms.size&&!fPlatforms.has(r.aggregator))return false;
    if(fBranches.size&&!fBranches.has(r.branch))return false;
    return true;
  });
}
function getCompRange(){
  if(!fStart||!fEnd)return{s:subDays(latest,7),e:subDays(latest,7)};
  const s=new Date(fStart+"T12:00:00"),e=new Date(fEnd+"T12:00:00");
  const n=Math.round((e-s)/86400000);
  const ce=new Date(s);ce.setDate(ce.getDate()-1);
  const cs=new Date(ce);cs.setDate(cs.getDate()-n);
  return{s:dk(cs),e:dk(ce)};
}
function getPD(){
  const{s,e}=getCompRange();
  return allData.filter(r=>{
    if(r.date<s||r.date>e)return false;
    if(fBrands.size&&!fBrands.has(r.brand))return false;
    if(fPlatforms.size&&!fPlatforms.has(r.aggregator))return false;
    if(fBranches.size&&!fBranches.has(r.branch))return false;
    return true;
  });
}
function getCompLabel(){
  const{s,e}=getCompRange();
  const days=fStart===fEnd?1:Math.round((new Date(fEnd)-new Date(fStart))/86400000)+1;
  if(days===1)return`vs ${fmtDisp(s)} (prev week same day)`;
  return`vs ${fmtDisp(s)} → ${fmtDisp(e)}`;
}
function getPeriodLabel(){
  if(!fStart)return"";
  if(fStart===fEnd)return fmtDisp(fStart);
  return`${fmtDisp(fStart)} → ${fmtDisp(fEnd)}`;
}

function fSetPreset(p){
  fPreset=p;
  if(p==="yesterday"){fStart=fEnd=latest;}
  else if(p==="7d"){fStart=subDays(latest,6);fEnd=latest;}
  else if(p==="30d"){fStart=subDays(latest,29);fEnd=latest;}
  else if(p==="month"){fStart=latest.slice(0,7)+"-01";fEnd=latest;}
  else if(p==="lmonth"){const now=new Date(latest+"T12:00:00");fStart=dk(new Date(now.getFullYear(),now.getMonth()-1,1));fEnd=dk(new Date(now.getFullYear(),now.getMonth(),0));}
  Object.values(charts).forEach(c=>c.destroy());charts={};
  renderPage(curPage);
}
function fApply(){
  const s=document.getElementById("f-s"),e=document.getElementById("f-e");
  if(s&&e){fStart=s.value;fEnd=e.value;}
  fPreset="custom";
  Object.values(charts).forEach(c=>c.destroy());charts={};
  renderPage(curPage);
}
function fToggle(type,val){
  const sets={brand:fBrands,platform:fPlatforms,branch:fBranches};
  const s=sets[type];if(s.has(val))s.delete(val);else s.add(val);
  Object.values(charts).forEach(c=>c.destroy());charts={};
  renderPage(curPage);
}
function fClear(){fBrands.clear();fPlatforms.clear();fBranches.clear();Object.values(charts).forEach(c=>c.destroy());charts={};renderPage(curPage);}
function toggleDD(id){const el=document.getElementById(id);if(!el)return;const was=el.classList.contains("open");document.querySelectorAll(".dd-menu").forEach(d=>d.classList.remove("open"));if(!was)el.classList.add("open");}
document.addEventListener("click",e=>{if(!e.target.closest(".dd-wrap"))document.querySelectorAll(".dd-menu").forEach(d=>d.classList.remove("open"));});

function makeFilterBar(opts){
  const{hideBrand=false,hidePlatform=false,hideOutlet=false}=opts||{};
  const presets=[["yesterday","Yesterday"],["7d","Last 7 Days"],["30d","Last 30 Days"],["month","This Month"],["lmonth","Last Month"],["custom","Custom Range"]];
  const pH=presets.map(([k,l])=>`<button class="preset ${fPreset===k?"act":""}" onclick="fSetPreset('${k}')">${l}</button>`).join("");
  const custH=fPreset==="custom"?`<div style="display:flex;align-items:center;gap:6px;margin-top:8px;flex-wrap:wrap"><input type="date" id="f-s" value="${fStart||""}" style="background:#111d2e;border:1px solid #1b2f4a;border-radius:5px;color:#e2e8f0;padding:4px 8px;font-size:11px"><span style="color:#64748b">→</span><input type="date" id="f-e" value="${fEnd||""}" style="background:#111d2e;border:1px solid #1b2f4a;border-radius:5px;color:#e2e8f0;padding:4px 8px;font-size:11px"><button onclick="fApply()" style="background:#f59e0b;border:none;border-radius:5px;color:#000;font-weight:700;padding:4px 12px;font-size:11px;cursor:pointer">Apply</button></div>`:"";
  const allB=[...new Set(allData.map(r=>r.branch))].sort();
  const brDD=hideBrand?"":dropdownHTML("fdd-br","Brand",fBrands,BR.map(b=>({val:b.n,label:b.n,color:b.c})),"brand");
  const plDD=hidePlatform?"":dropdownHTML("fdd-pl","Platform",fPlatforms,AGGS.map(a=>({val:a,label:a,color:AC[a]||"#888"})),"platform");
  const ouDD=hideOutlet?"":dropdownHTML("fdd-ou","Outlet",fBranches,allB.map(b=>({val:b,label:b+(AUH.has(b)?" (AUH)":""),color:"#94a3b8"})),"branch");
  const chips=[...[...fBrands].map(b=>`<span class="fchip" style="background:${BMAP[b]?.c||"#888"}22;color:${BMAP[b]?.c||"#888"};border:1px solid ${BMAP[b]?.c||"#888"}55" onclick="fToggle('brand','${b}')">✕ ${b}</span>`),
    ...[...fPlatforms].map(p=>`<span class="fchip" style="background:${AC[p]||"#888"}22;color:${AC[p]||"#888"};border:1px solid ${AC[p]||"#888"}55" onclick="fToggle('platform','${p}')">✕ ${p}</span>`),
    ...[...fBranches].map(b=>`<span class="fchip" style="background:#1b2f4a;color:#94a3b8;border:1px solid #1b2f4a" onclick="fToggle('branch','${b}')">✕ ${b}</span>`)].join("");
  const clearBtn=(fBrands.size||fPlatforms.size||fBranches.size)?`<button class="fpill" onclick="fClear()" style="color:#ef4444;border-color:#ef444444">✕ Clear</button>`:"";
  const periodBadge=`<span style="margin-left:auto;font-size:10px;color:#64748b;font-style:italic">${getPeriodLabel()}</span>`;
  const filtersRow=`<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:8px">${brDD}${plDD}${ouDD}${clearBtn}${chips}</div>`;
  return `<div class="fbar">
<div style="display:flex;align-items:center;gap:7px;flex-wrap:wrap">${pH}${periodBadge}</div>${custH}${filtersRow}</div>`;
}
function dropdownHTML(id,label,activeSet,items,type){
  const count=activeSet.size;
  const isOn=count>0;
  const itemsH=items.map(({val,label:lbl,color})=>`<label class="ddi"><input type="checkbox" ${activeSet.has(val)?"checked":""} onchange="fToggle('${type}','${val}')"><span style="color:${color}">${lbl}</span></label>`).join("");
  return `<div class="dd-wrap"><button class="fpill ${isOn?"on":""}" onclick="toggleDD('${id}')">${label} ${isOn?"("+count+")":"▾"}</button><div class="dd-menu" id="${id}">${itemsH}</div></div>`;
}

// ── ANALYTICS ──
const sumR=recs=>recs.reduce((a,r)=>({sales:a.sales+r.sales,orders:a.orders+r.orders}),{sales:0,orders:0});
function mkMap(recs,kFn){const m={};recs.forEach(r=>{const k=kFn(r);if(!m[k])m[k]={k,...r,sales:0,orders:0};m[k].sales+=r.sales;m[k].orders+=r.orders;});return m;}
function trend30(filterFn,start,end){
  const s=start||subDays(latest,30),e=end||latest;
  const m={};allData.filter(r=>filterFn(r)&&r.date>=s&&r.date<=e).forEach(r=>{if(!m[r.date])m[r.date]={d:r.date.slice(5),s:0,o:0};m[r.date].s+=r.sales;m[r.date].o+=r.orders;});
  return Object.values(m).sort((a,b)=>a.d.localeCompare(b.d));
}

// ── FORMATTERS ──
function kpiCard(label,value,sub,chg){
  const cc=chg!=null?pctClr(chg):"#64748b";
  return`<div class="sm"><div style="font-size:9px;color:#64748b;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:5px">${label}</div><div style="font-size:21px;font-weight:800;font-variant-numeric:tabular-nums;line-height:1">${value}</div>${sub?`<div style="font-size:11px;color:#64748b;margin-top:3px">${sub}</div>`:""}${chg!=null?`<div style="font-size:11px;color:${cc};font-weight:700;margin-top:3px">${fmtPct(chg)}</div>`:""}</div>`;
}
function pctTd(v){return`<td style="color:${pctClr(v)};font-weight:700">${fmtPct(v)}</td>`;}
function aggChip(agg){return`<span class="chip" style="background:${AC[agg]||"#888"}28;color:${AC[agg]||"#888"}">${agg}</span>`;}
function logoImg(name,size=26){return`<img src="${LOGOS[name]||""}" style="width:${size}px;height:${size}px;border-radius:5px;object-fit:contain;background:#fff;padding:1px;flex-shrink:0">`;}
function mkTable(heads,rows,sortFns){
  const hH=heads.map((h,i)=>sortFns&&sortFns[i]?`<th onclick="${sortFns[i]}">${h}</th>`:`<th>${h}</th>`).join("");
  return`<div style="overflow-x:auto"><table class="tbl"><thead><tr>${hH}</tr></thead><tbody>${rows.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join("")}</tr>`).join("")}</tbody></table></div>`;
}

function barChart(id,labels,values,colors,extra,mode){
  const ctx=document.getElementById(id)?.getContext("2d");if(!ctx)return;destroyChart(id);

function gp(page){
  curPage=page;

  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("act"));

// ── BRANDS ──
function renderBrands(){
  const b=BMAP[selBrand];
  const ld=getLD().filter(r=>r.brand===selBrand),pd=getPD().filter(r=>r.brand===selBrand);
  const ls=sumR(ld),ps=sumR(pd);
  const cm=mkMap(ld,r=>`${r.branch}|${r.aggregator}`),pm=mkMap(pd,r=>`${r.branch}|${r.aggregator}`);
  const rows=Object.values(cm).map(c=>{const[branch,aggregator]=c.k.split("|");const pv=pm[c.k];return{branch,aggregator,orders:c.orders,sales:c.sales,aov:c.orders>0?c.sales/c.orders:0,oc:pv?pctOf(c.orders,pv.orders):null,sc:pv?pctOf(c.sales,pv.sales):null};}).sort((a,b)=>b.sales-a.sales);
  const aggBar=AGGS.map(ag=>{const c=sumR(ld.filter(r=>r.aggregator===ag));return{ag,sales:c.sales,orders:c.orders,clr:AC[ag]};}).filter(a=>a.orders>0);
  const btnH=BR.map(br=>{const act=selBrand===br.n;return`<button onclick="selBrand='${br.n}';renderBrands()" class="brbtn" style="border-color:${act?br.c:"#1b2f4a"};background:${act?br.c+"22":"transparent"};color:${act?br.c:"#94a3b8"}">${logoImg(br.n,38)} <span style="font-size:12px;font-weight:700;white-space:nowrap">${br.n}</span></button>`;}).join("");

      ${kpiCard("Orders",ls.orders.toLocaleString(),getCompLabel()+": "+ps.orders,pctOf(ls.orders,ps.orders))}
      ${kpiCard("GMV",fmtAED(ls.sales),getCompLabel()+": "+fmtAED(ps.sales),pctOf(ls.sales,ps.sales))}
      ${kpiCard("AOV",`AED ${ls.orders>0?(ls.sales/ls.orders).toFixed(1):0}`,"per order",null)}

    </div>
    <div class="g2">
      <div class="sm"><div class="ct" style="color:${b?.c}">${selBrand} — GMV Trend</div><div style="position:relative;height:140px"><canvas id="ch-b-trend"></canvas></div></div>
      <div class="sm"><div class="ct" style="color:${b?.c}">${selBrand} — By Platform</div><div style="position:relative;height:140px"><canvas id="ch-b-agg"></canvas></div></div>
    </div>
    <div class="card"><div class="ct" style="color:${b?.c}">${selBrand} — Outlet × Platform (${getPeriodLabel()})</div>
      ${mkTable(["Outlet","Platform","Orders","GMV","AOV","Change Orders","Change GMV"],
        rows.map(r=>[`<strong>${r.branch}</strong>`,`<span style="color:${AC[r.aggregator]||"#888"};font-weight:700">${r.aggregator}</span>`,r.orders,fmtAED(r.sales),r.orders>0?`AED ${r.aov.toFixed(1)}`:"—",`<span style="color:${pctClr(r.oc)};font-weight:700">${fmtPct(r.oc)}</span>`,`<span style="color:${pctClr(r.sc)};font-weight:700">${fmtPct(r.sc)}</span>`]))}
    </div>`;

  setTimeout(()=>{
    trendChart("ch-b-trend",trend30(r=>r.brand===selBrand,fStart,fEnd),b?.c||"#888");
    barChart("ch-b-agg",aggBar.map(a=>a.ag),aggBar.map(a=>a.orders),aggBar.map(a=>a.clr),aggBar.map(a=>a.sales),"orders");
  },50);

// ── OUTLETS ──
function renderOutlets(){
  const ld=getLD(),pd=getPD();
  const cm=mkMap(ld,r=>`${r.brand}|${r.branch}`),pm=mkMap(pd,r=>`${r.brand}|${r.branch}`);
  const platMap={};ld.forEach(r=>{const k=`${r.brand}|${r.branch}`;if(!platMap[k])platMap[k]=new Set();platMap[k].add(r.aggregator);});
  const rows=Object.values(cm).map(c=>{const[brand,branch]=c.k.split("|");const pv=pm[c.k];return{brand,branch,orders:c.orders,sales:c.sales,aov:c.orders>0?c.sales/c.orders:0,plats:[...(platMap[c.k]||new Set())],oc:pv?pctOf(c.orders,pv.orders):null,sc:pv?pctOf(c.sales,pv.sales):null};}).sort((a,b)=>b.sales-a.sales);
  const dubai=rows.filter(r=>!AUH.has(r.branch)),auh=rows.filter(r=>AUH.has(r.branch));
  const mkOT=(title,rows)=>`<div class="card"><div class="ct">${title}</div>${mkTable(["Outlet","Brand","Platforms","Orders","GMV","AOV","Change Orders","Change GMV"],
    rows.map(r=>[`<strong>${r.branch}</strong>`,`<span style="color:${BMAP[r.brand]?.c||"#888"};font-weight:700">${r.brand}</span>`,r.plats.map(p=>aggChip(p)).join(""),r.orders,fmtAED(r.sales),`AED ${r.aov.toFixed(1)}`,`<span style="color:${pctClr(r.oc)};font-weight:700">${fmtPct(r.oc)}</span>`,`<span style="color:${pctClr(r.sc)};font-weight:700">${fmtPct(r.sc)}</span>`]))}</div>`;

  document.getElementById("page-outlets").innerHTML=
    makeFilterBar({hideOutlet:true})+
    mkOT(`📍 Dubai Outlets — ${getPeriodLabel()} vs ${getCompLabel()}`,dubai)+
    (auh.length?mkOT(`📍 Abu Dhabi Outlets — ${getPeriodLabel()} vs ${getCompLabel()}`,auh):"");
}

// ── PLATFORMS ──
function renderPlatforms(){
  const clr=AC[selPlatform]||"#888";
  const aggSums=AGGS.map(ag=>{const c=sumR(getLD().filter(r=>r.aggregator===ag));const p=sumR(getPD().filter(r=>r.aggregator===ag));return{ag,clr:AC[ag],...c,aov:c.orders>0?c.sales/c.orders:0,oc:pctOf(c.orders,p.orders),sc:pctOf(c.sales,p.sales)};});

  const cards=aggSums.map(a=>`<div class="sm" style="cursor:pointer;border-color:${selPlatform===a.ag?a.clr:"#1b2f4a"};box-shadow:${selPlatform===a.ag?`0 0 0 1px ${a.clr}`:"none"}" onclick="selPlatform='${a.ag}';renderPlatforms()"><div style="display:flex;align-items:center;gap:6px;margin-bottom:5px">${logoImg(a.ag,24)}<span style="font-size:9px;color:${a.clr};font-weight:700;text-transform:uppercase">${a.ag}</span></div><div style="font-size:19px;font-weight:800;font-variant-numeric:tabular-nums">${a.orders.toLocaleString()}</div><div style="font-size:11px;color:#64748b">${fmtAED(a.sales)}</div><div style="font-size:11px;color:${pctClr(a.oc)};font-weight:700;margin-top:2px">${fmtPct(a.oc)}</div></div>`).join("");

    makeFilterBar({hidePlatform:true})+

    ${note?`<div class="card" style="background:rgba(245,158,11,.05);border-color:rgba(245,158,11,.2);margin-bottom:12px"><div style="font-size:12px;color:#FDE68A;line-height:1.7">💡 ${note}</div></div>`:""}
    <div class="g4">

      ${kpiCard("GMV",fmtAED(ls.sales),getCompLabel(),pctOf(ls.sales,ps.sales))}
      ${kpiCard("AOV",`AED ${ls.orders>0?(ls.sales/ls.orders).toFixed(1):0}`,"per order",null)}
      ${kpiCard("Active Outlets",new Set(ld.map(r=>r.branch)).size,"outlets",null)}
    </div>
    <div class="sm" style="margin-bottom:12px"><div class="ct" style="color:${clr}">${selPlatform} — GMV Trend</div><div style="position:relative;height:130px"><canvas id="ch-p-trend"></canvas></div></div>
    <div class="card"><div class="ct" style="color:${clr}">Brand Performance on ${selPlatform} — ${getPeriodLabel()}</div>
      ${mkTable(["Brand","Orders","GMV","AOV","Change Orders","Change GMV"],
        brandRows.map(b=>[`<span style="display:inline-flex;align-items:center;gap:7px">${logoImg(b.n,22)}<strong style="color:${b.c}">${b.n}</strong></span>`,b.cv.orders,fmtAED(b.cv.sales),b.cv.orders>0?`AED ${(b.cv.sales/b.cv.orders).toFixed(1)}`:"—",`<span style="color:${pctClr(b.oc)};font-weight:700">${fmtPct(b.oc)}</span>`,`<span style="color:${pctClr(b.sc)};font-weight:700">${fmtPct(b.sc)}</span>`]))}
    </div>`;

  setTimeout(()=>{trendChart("ch-p-trend",trend30(r=>r.aggregator===selPlatform,fStart,fEnd),clr);},50);
}

// ── CPC BUDGETS ──
function renderCPC(){
  const now=new Date(latest+"T12:00:00");
  const pS=dk(new Date(now.getFullYear(),now.getMonth()-1,1)),pE=dk(new Date(now.getFullYear(),now.getMonth(),0));
  const prior=allData.filter(r=>r.date>=pS&&r.date<=pE),period=pS.slice(0,7);
  const agg={};prior.forEach(r=>{agg[r.aggregator]=(agg[r.aggregator]||0)+r.sales;});
  const bAgg={};BR.forEach(b=>{bAgg[b.n]={};AGGS.forEach(a=>bAgg[b.n][a]=0);});
  prior.forEach(r=>{if(bAgg[r.brand])bAgg[r.brand][r.aggregator]=(bAgg[r.brand][r.aggregator]||0)+r.sales;});
  const mandatory={Deliveroo:(agg.Deliveroo||0)*0.02,Noon:(agg.Noon||0)*0.04,Careem:(agg.Careem||0)*0.04,Talabat:20000};
  const VC={SCALE:"#22C55E",INVEST:"#86EFAC",MONITOR:"#FBBF24",PAUSE:"#EF4444"},VB={SCALE:"rgba(34,197,94,.1)",INVEST:"rgba(134,239,172,.07)",MONITOR:"rgba(251,191,36,.09)",PAUSE:"rgba(239,68,68,.09)"};
  const roasH=Object.entries(HR).map(([key,outlets])=>{
    const[brand,aggregator]=key.split("|");const be=BE[aggregator]||2;
    const chips=Object.entries(outlets).sort((a,b)=>b[1]-a[1]).map(([outlet,roas])=>{const v=roas>be+1?"SCALE":roas>be+0.3?"INVEST":roas>be?"MONITOR":"PAUSE";return`<div style="display:inline-flex;gap:6px;align-items:center;background:${VB[v]};border:1px solid ${VC[v]}44;border-radius:5px;padding:3px 9px;font-size:11px;margin:2px"><span style="font-weight:700;color:${VC[v]}">${v}</span><span style="color:#94a3b8">${outlet}</span><span style="color:#64748b;font-variant-numeric:tabular-nums">${roas}×</span></div>`;}).join("");
    return`<div style="margin-bottom:14px"><div style="font-size:11px;font-weight:700;margin-bottom:6px"><span style="color:${BMAP[brand]?.c||"#888"}">${brand}</span><span style="color:${AC[aggregator]||"#888"};margin-left:8px">${aggregator}</span><span style="color:#64748b;font-weight:400;margin-left:8px">BE ${be}×</span></div><div style="display:flex;flex-wrap:wrap">${chips}</div></div>`;
  }).join("");

  document.getElementById("page-cpc").innerHTML=`
    <div class="card" style="border-color:rgba(245,158,11,.25)">
      <div class="ct" style="color:#f59e0b">Mandatory CPC Obligations — Based on ${period} GMV</div>
      <div class="g4">
        ${[{ag:"Deliveroo",clr:AC.Deliveroo,amt:mandatory.Deliveroo,note:"2% group GMV",sub:`Prior: ${fmtAED(agg.Deliveroo||0)}`},{ag:"Noon",clr:AC.Noon,amt:mandatory.Noon,note:"4% group GMV",sub:"Pool min AED 1,000"},{ag:"Careem",clr:AC.Careem,amt:mandatory.Careem,note:"4% group GMV",sub:"Bids locked AED 2.00"},{ag:"Talabat",clr:AC.Talabat,amt:mandatory.Talabat,note:"If contract signed",sub:"Min AED 650/outlet"}].map(o=>`<div class="sm"><div style="display:flex;align-items:center;gap:6px;margin-bottom:5px">${logoImg(o.ag,24)}<span style="font-size:9px;color:${o.clr};font-weight:700;text-transform:uppercase">${o.ag}</span></div><div style="font-size:19px;font-weight:800;font-variant-numeric:tabular-nums">${fmtAED(o.amt)}</div><div style="font-size:11px;color:#f59e0b;font-weight:600">${o.note}</div><div style="font-size:11px;color:#64748b">${o.sub}</div></div>`).join("")}
      </div>
      <div style="font-size:11px;color:#64748b;margin-top:8px">⚠️ Obligations are GROUP-LEVEL — allocate to highest-ROAS outlets regardless of brand.</div>
    </div>
    <div class="card">
      <div class="ct">Per-Brand Prior Month GMV → Mandatory Budget</div>
      ${mkTable(["Brand","Deliveroo GMV","→ Budget","Noon GMV","→ Budget","Careem GMV","→ Budget"],
        BR.map(b=>[`<span style="color:${b.c};font-weight:700">${b.n}</span>`,`<span style="color:#64748b;font-size:11px">${fmtAED(bAgg[b.n]?.Deliveroo||0)}</span>`,`<span style="color:${AC.Deliveroo};font-weight:700">${fmtAED((bAgg[b.n]?.Deliveroo||0)*0.02)}</span>`,`<span style="color:#64748b;font-size:11px">${fmtAED(bAgg[b.n]?.Noon||0)}</span>`,`<span style="color:${AC.Noon};font-weight:700">${fmtAED((bAgg[b.n]?.Noon||0)*0.04)}</span>`,`<span style="color:#64748b;font-size:11px">${fmtAED(bAgg[b.n]?.Careem||0)}</span>`,`<span style="color:${AC.Careem};font-weight:700">${fmtAED((bAgg[b.n]?.Careem||0)*0.04)}</span>`]))}
    </div>
    <div class="card"><div class="ct">Historical ROAS Verdicts by Outlet</div>${roasH}</div>`;
}

// ── AI BRIEF ──
async function genBrief(){
  const el=document.getElementById("brief-content");if(!el)return;
  el.innerHTML=`<div style="color:#64748b;font-size:12px">Generating analysis for ${getPeriodLabel()}...</div>`;
  const ld=getLD(),pd=getPD();
  const ls=sumR(ld),ps=sumR(pd);
  const byB={};BR.forEach(b=>{byB[b.n]=sumR(ld.filter(r=>r.brand===b.n));});
  const pvB={};BR.forEach(b=>{pvB[b.n]=sumR(pd.filter(r=>r.brand===b.n));});
  const byA={};AGGS.forEach(a=>{byA[a]=sumR(ld.filter(r=>r.aggregator===a));});
  const cm=mkMap(ld,r=>`${r.brand}|${r.branch}|${r.aggregator}`),pm2=mkMap(pd,r=>`${r.brand}|${r.branch}|${r.aggregator}`);
  const changes=Object.values(cm).map(c=>{const[brand,branch,aggregator]=c.k.split("|");const pv=pm2[c.k];return{label:`${brand} ${branch} ${aggregator}`,orders:c.orders,sales:c.sales,oc:pv?pctOf(c.orders,pv.orders):null};});
  const top3=[...changes].filter(x=>x.oc!=null).sort((a,b)=>b.oc-a.oc).slice(0,3);
  const bot3=[...changes].filter(x=>x.oc!=null).sort((a,b)=>a.oc-b.oc).slice(0,3);
  const zeros=Object.keys(pm2).filter(k=>pm2[k].orders>0&&!cm[k]).map(k=>k.replace(/\|/g," ")).slice(0,4);
  const prompt=`You are BD analyst for Oregano Group UAE. Period: ${getPeriodLabel()}. Compare: ${getCompLabel()}.
Total: ${ls.orders} orders AED ${ls.sales.toFixed(0)} GMV | WoW: Orders ${fmtPct(pctOf(ls.orders,ps.orders))} GMV ${fmtPct(pctOf(ls.sales,ps.sales))}
By Brand: ${BR.map(b=>`${b.n}: ${byB[b.n].orders} orders (${fmtPct(pctOf(byB[b.n].orders,pvB[b.n].orders))})`).join(", ")}
By Platform: ${AGGS.map(a=>`${a}: ${byA[a].orders} orders AED ${byA[a].sales.toFixed(0)}`).join(", ")}
Top 3: ${top3.map(x=>`${x.label}: ${fmtPct(x.oc)}`).join(", ")}
Bottom 3: ${bot3.map(x=>`${x.label}: ${fmtPct(x.oc)}`).join(", ")}
Zeros (had orders prev): ${zeros.length?zeros.join(", "):"None"}
Context: Smokeys structural decline. Deliveroo=2%, Noon/Careem=4% mandatory.
Return ONLY valid JSON: {"headline":"<15w>","wins":["w1","w2","w3"],"issues":["i1","i2","i3"],"actions":["a1","a2","a3"],"insight":"2-3 sentence note"}`;
  try{
    const resp=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:prompt}]})});
    if(!resp.ok)throw new Error("cors");
    const j=await resp.json();if(j.error)throw new Error(j.error.message);
    const b=JSON.parse((j.content?.[0]?.text||"").replace(/```json|```/g,"").trim());
    el.innerHTML=`<div style="font-size:15px;font-weight:700;color:#FCD34D;margin-bottom:12px;line-height:1.4">${b.headline||""}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:10px">
        ${[["✅ What Worked","#22C55E",b.wins],["⚠️ Needs Attention","#EF4444",b.issues],["📋 Actions Today","#f59e0b",b.actions]].map(([t,c,items])=>`<div><div style="font-size:10px;font-weight:700;color:${c};text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px">${t}</div>${(items||[]).map(i=>`<div style="font-size:12px;margin-bottom:4px;line-height:1.5">• ${i}</div>`).join("")}</div>`).join("")}
      </div>
      ${b.insight?`<div style="background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.2);border-radius:6px;padding:8px 12px;font-size:12px;color:#FDE68A;line-height:1.6">💡 ${b.insight}</div>`:""}`;
  }catch(e){
    const isCors=e.message==="cors"||e.message.includes("fetch");
    el.innerHTML=isCors?`<div style="font-size:12px;color:#64748b;line-height:1.8"><span style="color:#f59e0b;font-weight:700">AI Brief runs in Claude.ai only</span> — external hosts block the Anthropic API. All data below works perfectly.</div>`:`<div style="color:#64748b;font-size:12px">Brief unavailable</div>`;
  }
}
